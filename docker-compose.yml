version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: deliverymilionario-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deliverymilionario
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - deliverymilionario-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: deliverymilionario-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - deliverymilionario-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deliverymilionario-backend
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/deliverymilionario
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
      - PORT=3000
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - deliverymilionario-network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  deliverymilionario-network:
    driver: bridge
